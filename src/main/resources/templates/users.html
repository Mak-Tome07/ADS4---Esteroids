<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Usuarios</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Usuarios</h1>
    <br><br>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Role</th>
                <th>Ativo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${users}">
                <td th:text="${usuario.id}"></td>
                <td th:text="${usuario.username}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.role}"></td>
                <td th:text="${usuario.isActive()}"></td>
                <td>
                    <a th:href="'/usuario/' + ${usuario.id} + '/atualizar'">Editar</a>
                </td>
                <td>
                    <a th:href="'/usuario/' + ${usuario.id} + '/deletar'">Deletar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/}">Voltar</a>
</body>
</html>
