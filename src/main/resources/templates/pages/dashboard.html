<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/images/icons/smile-svgrepo-com.svg}">
</head>
<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div class="logo">Esteroids</div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}" class="active">Dashboard</a>
      <a th:href="@{/listar/produtos}">Produtos</a>
      <a th:href="@{/listar/pedidos}">Pedidos</a>
      <a th:href="@{/listar/usuarios}">Clientes</a>
    </nav>
    <button class="logout-btn">Logout</button>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN CONTENT -->

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="admin-menu-toggle" id="adminMenuToggle">☰</button>
        <h1>Dashboard</h1>
      </div>
      <div class="admin-profile">
        <div class="avatar"></div>
        <span>Admin</span>
      </div>
    </header>

    <section class="metrics-grid">
      <div class="metric-card">
        <span>Total Produtos</span>
        <h2>124</h2>
      </div>
      <div class="metric-card">
        <span>Pedidos</span>
        <h2>57</h2>
      </div>
      <div class="metric-card">
        <span>Receita</span>
        <h2>R$ 12.450</h2>
      </div>
      <div class="metric-card">
        <span>Sem Estoque</span>
        <h2>8</h2>
      </div>
    </section>
  </main>
  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
