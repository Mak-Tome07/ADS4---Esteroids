<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esteroids | Carrinho</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/shop.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/images/icons/smile-svgrepo-com.svg}">
</head>
<body>

  <!-- NAVBAR -->

  <header class="navbar">
    <div class="logo">Esteroids</div>
    <div class="mobile-menu" id="mobileMenu">
      <nav class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/shop}">Catálogo</a>
        <a th:href="@{/#contato}">Contato</a>
      </nav>
      <div class="nav-actions">
        <form th:action="@{/shop}" method="get" class="shop-search">
          <input type="text" name="search" placeholder="Buscar produto...">
          <button type="submit" class="secondary-btn">Buscar</button>
        </form>
        <a th:href="@{/login}" class="secondary-btn auth-btn">Login</a>
      </div>
    </div>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <!-- HEADER -->

  <section class="cart-header">
    <a th:href="@{/}" class="back-link">← Voltar para loja</a>
    <h1>Seu Carrinho</h1>
    <p>Revise seus produtos antes do checkout./p>
  </section>

  <!-- CART LAYOUT -->

  <main class="cart-layout">

    <!-- ITEMS -->

    <section class="cart-items">
      <div th:if="${#lists.isEmpty(cart)}">
        <p>Seu carrinho está vazio.</p>
      </div>

      <div th:unless="${#lists.isEmpty(cart)}">

        <!-- ITEM -->

        <article class="cart-item" th:each="item : ${cart}">
            <a th:href="@{'/produto/' + ${item.product.id}}">
              <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}">
            </a>
            <div class="cart-info">
              <span class="catalog-category" th:text="${item.product.category}"></span>
              <h3 th:text="${item.product.name}"></h3>
              <p class="cart-price">R$
                <span th:text="${item.product.price}"></span>
              </p>
            </div>

          <div class="cart-quantity">
            <button>-</button>
            <span th:text="${item.quantity}"></span>
            <button>+</button>
          </div>
          <a th:href="@{'/cart/remove/' + ${item.product.id}}" class="remove-btn">Remover</a>
        </article>
      </div>
    </section>

    <!-- SUMMARY -->

    <aside class="cart-summary">
      <h2>Resumo</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span>R$
          <span th:text="${total}"></span>
        </span>
      </div>
      <div class="summary-row">
        <span>Frete</span>
        <span>R$ 29,90</span>
      </div>
      <div class="summary-row total-row">
        <span>Total</span>
        <span>
          R$
          <span th:text="${total + 29.90}"></span>
        </span>
      </div>
      <a href="#" class="primary-btn checkout-btn">
        Finalizar Compra
      </a>
    </aside>
  </main>
  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
