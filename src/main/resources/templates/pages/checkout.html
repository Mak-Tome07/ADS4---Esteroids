<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esteroids | Checkout</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/shop.css">
  <link rel="icon" type="image/svg+xml" href="../assets/smile-svgrepo-com.svg">
</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">
    <div class="logo">Esteroids</div>
    <div class="mobile-menu" id="mobileMenu">
      <nav class="nav-links">
        <a href="../pages/shop.html">Catálogo</a>
        <a href="../pages/cart.html">Carrinho</a>
      </nav>
    </div>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <!-- HEADER -->

  <section class="checkout-header">
    <a href="../pages/landing-page.html" class="back-link">← Voltar para loja</a>
    <h1>Checkout</h1>
    <p>Finalize sua compra com segurança.</p>
  </section>

  <!-- LAYOUT -->

  <main class="checkout-layout">

    <!-- FORM -->

    <section class="checkout-form-container">

      <!--INFORMAÇÕES PESSOAIS-->

      <form class="checkout-form">
        <div class="checkout-section">
          <h2>Informações Pessoais</h2>
          <div class="checkout-grid">
            <div class="input-group">
              <label>Nome Completo</label>
              <input type="text" placeholder="Seu nome">
            </div>
            <div class="input-group">
              <label>Email</label>
              <input type="email" placeholder="email@email.com">
            </div>
          </div>
        </div>

        <!-- ENTREGA -->

        <div class="checkout-section">
          <h2>Endereço de Entrega</h2>
          <div class="checkout-grid">
            <div class="input-group">
              <label>CEP</label>
              <input type="text" placeholder="00000-000">
            </div>
            <div class="input-group">
              <label>Cidade</label>
              <input type="text" placeholder="Sua cidade">
            </div>
          </div>

          <div class="input-group">
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número...">
          </div>
        </div>

        <!-- PAGAMENTO -->

        <div class="checkout-section">
          <h2>Pagamento</h2>
          <div class="checkout-grid">
            <div class="input-group">
              <label>Número do Cartão</label>
              <input type="text" placeholder="0000 0000 0000 0000">
            </div>
            <div class="input-group">
              <label>Nome no Cartão</label>
              <input type="text" placeholder="Nome impresso">
            </div>
          </div>
          <div class="checkout-grid">
            <div class="input-group">
              <label>Validade</label>
              <input type="text" placeholder="MM/AA">
            </div>
            <div class="input-group">
              <label>CVV</label>
              <input type="text" placeholder="123">
            </div>
          </div>
        </div>
      </form>
    </section>

    <!-- SUMMARY -->

    <aside class="checkout-summary">
      <h2>Resumo do Pedido</h2>
      <div class="summary-product">
        <span>Jareth Sirius</span>
        <span>R$ 459,90</span>
      </div>
      <div class="summary-product">
        <span>Maven Sirius</span>
        <span>R$ 459,90</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row">
        <span>Subtotal</span>
        <span>R$ 919,80</span>
      </div>
      <div class="summary-row">
        <span>Frete</span>
        <span>R$ 29,90</span>
      </div>
      <div class="summary-row total-row">
        <span>Total</span>
        <span>R$ 949,70</span>
      </div>
      <button class="primary-btn checkout-btn">Confirmar Compra</button>
    </aside>
  </main>
  <script src="../js/main.js" defer></script>
</body>
</html>
