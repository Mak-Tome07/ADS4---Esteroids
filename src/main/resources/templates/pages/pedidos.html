<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/images/icons/smile-svgrepo-com.svg}">
</head>
<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div class="logo">Esteroids</div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/listar/produtos}">Produtos</a>
      <a th:href="@{/listar/pedidos}" class="active">Pedidos</a>
      <a th:href="@{/listar/usuarios}">Clientes</a>
    </nav>
    <a th:if="${session.usuarioLogado != null}" th:href="@{/logout}" onclick="return confirm('Deseja sair?')" class="logout-btn">Sair</a>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">
      <div class="topbar-left">
      <button class="admin-menu-toggle" id="adminMenuToggle">☰</button>
      <h1>Pedidos</h1>
      <p class="page-subtitle">Gerencie os pedidos realizados.</p>
      </div>
      <div class="admin-profile">
        <div class="avatar"></div>
        <span>Admin</span>
      </div>
    </header>

    <!-- FILTERS -->

    <section class="products-header">
      <div class="search-box">
        <input type="text" placeholder="Buscar pedido...">
      </div>
      <select class="filter-select">
        <option>Todos Status</option>
        <option>Pendente</option>
        <option>Pago</option>
        <option>Enviado</option>
        <option>Cancelado</option>
      </select>
    </section>

    <!-- TABLE -->

    <section class="table-container">
      <table class="products-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Data</th>
            <th>Status</th>
            <th>Total</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>

          <!-- ORDER -->

          <tr th:each="pedido : ${pedidos}">
            <td th:text="'#' + ${pedido.id}"></td>
            <td th:text="${pedido.customerName}"></td>
            <td th:text="${pedido.createdAt}"></td>
            <td th:text="${pedido.status}"></td>
            <td th:text="'R$ ' + ${pedido.total}"></td>
            <td>
              <div class="actions">
                <a th:href="@{'/pedido/' + ${pedido.id}}" class="edit-btn">Detalhes</a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
