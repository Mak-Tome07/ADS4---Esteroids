<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esteroids | Produtos</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/assets/smile-svgrepo-com.svg}">
</head>

<body>

  <aside class="sidebar">
    <div class="logo">Esteroids</div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/listar/produtos}" class="active">Produtos</a>
      <a th:href="@{/listar/pedidos}">Pedidos</a>
      <a th:href="@{/listar/usuarios}">Clientes</a>
    </nav>
    <button class="logout-btn">Logout</button>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Produtos</h1>
        <p class="page-subtitle">Gerencie os produtos da loja.</p>
      </div>
    </header>

    <section class="products-header">
      <div class="search-box">
        <input type="text" placeholder="Buscar produto...">
      </div>
      <a th:href="@{/produto}" class="primary-btn">+ Novo Produto</a>
    </section>

    <section class="table-container" th:if="${not #lists.isEmpty(products)}">
      <table class="products-table">
        <thead>
          <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="produto : ${products}">
            <td>
              <img th:src="${produto.imageUrl}" class="product-image" alt="Imagem do Produto">
            </td>
            <td th:text="${produto.name}"></td>
            <td th:text="'R$ ' + ${produto.price}"></td>
            <td th:text="${produto.stock}"></td>
            <td>
              <span th:if="${produto.active}" class="status active-status">Ativo</span>
              <span th:unless="${produto.active}" class="status inactive-status">Inativo</span>
            </td>
            <td>
              <div class="actions">
                <a th:href="@{/produto/{id}/atualizar(id=${produto.id})}" class="edit-btn" style="text-decoration: none; text-align: center;">Editar</a>
                <form th:action="@{/produto/{id}/deletar(id=${produto.id})}" method="post" style="display:inline;">
                    <button type="submit" class="disable-btn">Deletar</button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="table-container" th:if="${#lists.isEmpty(products)}" style="text-align: center; padding: 50px 20px;">
        <div class="empty-state">
            <p class="page-subtitle" style="font-size: 1.2rem; margin-bottom: 15px;">Nenhum produto cadastrado até o momento.</p>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Clique no botão "+ Novo Produto" acima para começar a abastecer o estoque de Esteroids!</p>
        </div>
    </section>

  </main>

  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
