<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esteroids | Clientes</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/assets/smile-svgrepo-com.svg}">
</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div class="logo">Esteroids</div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/listar/produtos}">Produtos</a>
      <a th:href="@{/listar/pedidos}">Pedidos</a>
      <a th:href="@{/listar/usuarios}">Clientes</a>
    </nav>
    <button class="logout-btn">Logout</button>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">
      <div class="topbar-left">
        <button class="admin-menu-toggle" id="adminMenuToggle">☰</button>
        <h1>Clientes</h1>
        <p class="page-subtitle">Gerencie os usuários cadastrados.</p>
      </div>
      <div class="admin-profile">
        <div class="avatar"></div>
        <span>Admin</span>
      </div>
    </header>

    <!-- FILTERS -->

    <section class="customers-header">
      <div class="search-box">
        <input type="text" placeholder="Buscar cliente...">
      </div>
      <select class="filter-select">
        <option>Todos</option>
        <option>Ativos</option>
        <option>Bloqueados</option>
      </select>
    </section>

    <!-- TABLE -->

    <section class="table-container">
      <table class="products-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Email</th>
            <th>Pedidos</th>
            <th>Status</th>
            <th>Cadastro</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>

          <!-- CUSTOMER -->

          <tr>
            <td>
              <div class="customer-cell">
                <div class="customer-avatar">E</div>
                <div>
                  <strong>Ernesto</strong>
                </div>
              </div>
            </td>
            <td>ernesto@email.com</td>
            <td>12</td>
            <td>
              <span class="status active-status">Ativo</span>
            </td>
            <td>12/04/2026</td>
            <td>
              <div class="actions">
                <button class="edit-btn">Visualizar</button>
                <button class="disable-btn">Bloquear</button>
              </div>
            </td>
          </tr>

          <!-- CUSTOMER -->

          <tr>
            <td>
              <div class="customer-cell">
                <div class="customer-avatar">L</div>
                <div>
                  <strong>Lucas</strong>
                </div>
              </div>
            </td>
            <td>lucas@email.com</td>
            <td>4</td>
            <td>
              <span class="status inactive-status">Bloqueado</span>
            </td>
            <td>02/03/2026</td>
            <td>
              <div class="actions">
                <button class="edit-btn">Visualizar</button>
                <button class="secondary-btn">Desbloquear</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
