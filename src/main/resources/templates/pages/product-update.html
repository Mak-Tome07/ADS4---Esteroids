<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Produto</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/assets/smile-svgrepo-com.svg}">
</head>
<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div class="logo">Esteroids</div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/listar/produtos}" class="active">Produtos</a>
      <a th:href="@{/listar/pedidos}">Pedidos</a>
      <a th:href="@{/listar/usuarios}">Clientes</a>
    </nav>
    <a th:if="${session.usuarioLogado != null}" th:href="@{/logout}" onclick="return confirm('Deseja sair?')" class="logout-btn">Sair</a>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Editar Produto</h1>
        <p class="page-subtitle">Atualize os dados do produto.</p>
      </div>
    </header>

    <section class="form-card">
      <form th:action="@{/produto/{id}/atualizar(id=${id})}" th:object="${product}" method="post" enctype="multipart/form-data" class="product-form">
        <div class="input-group">
          <label>Nome do Produto</label>
          <input type="text" th:field="*{name}" placeholder="Ex: Gojo Satoru Figure" required>
        </div>

        <div class="input-group">
          <label>Descrição</label>
          <textarea th:field="*{description}" placeholder="Descrição do produto..."></textarea>
        </div>

        <div class="form-grid">
          <div class="input-group">
            <label>Preço</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" placeholder="R$ 0,00" required>
          </div>

          <div class="input-group">
            <label>Estoque</label>
            <input type="number" min="0" th:field="*{stock}" placeholder="0" required>
          </div>
        </div>

        <div class="input-group">
         <label>Imagem do Produto</label>
         <input type="file" name="imagemArquivo" accept="image/*">
        </div>

        <div class="input-group">
          <label>Categoria</label>
          <select th:field="*{category}" required>
            <option value="" disabled>Selecione uma categoria</option>
            <option value="ANIMES">Animes</option>
            <option value="JOGOS">Jogos / Games</option>
            <option value="FILMES">Filmes</option>
            <option value="SERIES">Séries</option>
            <option value="LIVROS">Livros</option>
          </select>
        </div>

        <div class="input-group">
          <label>Status Inicial</label>
          <select th:field="*{active}">
            <option th:value="true">Ativo</option>
            <option th:value="false">Inativo</option>
          </select>
        </div>

        <div class="form-actions">
          <a th:href="@{/listar/produtos}" class="secondary-btn" style="text-decoration: none; text-align: center; line-height: 2.5;">Cancelar</a>
          <button type="submit" class="primary-btn">Atualizar Produto</button>
        </div>
      </form>
    </section>
  </main>
  <script th:src="@{/js/main.js}" defer></script>
</body>
</html>
