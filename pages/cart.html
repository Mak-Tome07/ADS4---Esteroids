<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Esteroids | Carrinho</title>

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/shop.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      Esteroids
    </div>

    <nav class="nav-links">

      <a href="../pages/landing-page.html">
        Home
      </a>

      <a href="../pages/landing-page.html#catalogo">
        Catálogo
      </a>

      <a href="../pages/landing-page.html#contato">
        Contato
      </a>

    </nav>

    <div class="nav-actions">

      <a href="../pages/login.html" class="secondary-btn">
        Login
      </a>

    </div>

  </header>

  <!-- HEADER -->

  <section class="cart-header">

    <h1>
      Seu Carrinho
    </h1>

    <p>
      Revise seus produtos antes do checkout.
    </p>

  </section>

  <!-- CART LAYOUT -->

  <main class="cart-layout">

    <!-- ITEMS -->

    <section class="cart-items">

      <!-- ITEM -->

      <article class="cart-item">

        <img
          src="https://placehold.co/200x200"
          alt=""
        >

        <div class="cart-info">

          <span class="catalog-category">
            Anime
          </span>

          <h3>
            Gojo Satoru Figure
          </h3>

          <p class="cart-price">
            R$ 499,90
          </p>

        </div>

        <div class="cart-quantity">

          <button>-</button>

          <span>1</span>

          <button>+</button>

        </div>

        <button class="remove-btn">
          Remover
        </button>

      </article>

      <!-- ITEM -->

      <article class="cart-item">

        <img
          src="https://placehold.co/200x200"
          alt=""
        >

        <div class="cart-info">

          <span class="catalog-category">
            Games
          </span>

          <h3>
            2B Nier Automata
          </h3>

          <p class="cart-price">
            R$ 899,90
          </p>

        </div>

        <div class="cart-quantity">

          <button>-</button>

          <span>1</span>

          <button>+</button>

        </div>

        <button class="remove-btn">
          Remover
        </button>

      </article>

    </section>

    <!-- SUMMARY -->

    <aside class="cart-summary">

      <h2>
        Resumo
      </h2>

      <div class="summary-row">

        <span>
          Subtotal
        </span>

        <span>
          R$ 1399,80
        </span>

      </div>

      <div class="summary-row">

        <span>
          Frete
        </span>

        <span>
          R$ 29,90
        </span>

      </div>

      <div class="summary-row total-row">

        <span>
          Total
        </span>

        <span>
          R$ 1429,70
        </span>

      </div>

      <a href="../pages/checkout.html" class="primary-btn checkout-btn">

        Finalizar Compra

      </a>

    </aside>

  </main>

</body>
</html>
