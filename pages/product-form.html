<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cadastro Produto</title>

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin.css">

</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      Esteroids
    </div>

    <nav class="sidebar-nav">

      <a href="../pages/admin-dashboard.html">
        Dashboard
      </a>

      <a href="../pages/products.html" class="active">
        Produtos
      </a>

      <a href="../pages/orders.html">
        Pedidos
      </a>

      <a href="../pages/customers.html">
        Clientes
      </a>

    </nav>

    <button class="logout-btn">
      Logout
    </button>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">

      <div>

        <h1>
          Novo Produto
        </h1>

        <p class="page-subtitle">
          Cadastre um novo item da loja.
        </p>

      </div>

      <div class="admin-profile">

        <div class="avatar"></div>

        <span>
          Admin
        </span>

      </div>

    </header>

    <!-- FORM CARD -->

    <section class="form-card">

      <form class="product-form">

        <!-- NOME -->

        <div class="input-group">

          <label>
            Nome do Produto
          </label>

          <input
            type="text"
            placeholder="Ex: Gojo Satoru Figure"
          >

        </div>

        <!-- DESCRIÇÃO -->

        <div class="input-group">

          <label>
            Descrição
          </label>

          <textarea
            placeholder="Descrição do produto..."
          ></textarea>

        </div>

        <!-- GRID -->

        <div class="form-grid">

          <!-- PREÇO -->

          <div class="input-group">

            <label>
              Preço
            </label>

            <input
              type="number"
              placeholder="R$ 0,00"
            >

          </div>

          <!-- ESTOQUE -->

          <div class="input-group">

            <label>
              Estoque
            </label>

            <input
              type="number"
              placeholder="0"
            >

          </div>

        </div>

        <!-- IMAGEM -->

        <div class="input-group">
          <label for="foto-produto">Imagem do Produto</label>
          <input 
            type="file" 
            id="foto-produto" 
            accept="image/*"
            class="file-input"
          >
        </div>

        <!-- STATUS -->

        <div class="input-group">

          <label>
            Status
          </label>

          <select>

            <option>
              Ativo
            </option>

            <option>
              Inativo
            </option>

          </select>

        </div>

        <!-- ACTIONS -->

        <div class="form-actions">

          <button
            type="button"
            class="secondary-btn"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="primary-btn"
          >
            Salvar Produto
          </button>

        </div>

      </form>

    </section>

  </main>

</body>
</html>
