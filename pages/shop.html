<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Esteroids | Catálogo</title>

  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/shop.css">

</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      Esteroids
    </div>

    <nav class="nav-links">

      <a href="../pages/landing-page.html">
        Home
      </a>

      <a href="../pages/shop.html" class="active-link">
        Catálogo
      </a>

      <a href="../pages/landing-page.html#categorias">
        Categorias
      </a>

      <a href="../pages/landing-page.html#contato">
        Contato
      </a>

    </nav>

    <div class="nav-actions">

      <button class="secondary-btn">
        Buscar
      </button>

      <a href="../pages/cart.html" class="cart-btn">
        Carrinho (2)
      </a>

    </div>

  </header>

  <!-- PAGE HEADER -->

  <section class="shop-header">

    <div>

      <h1>
        Catálogo
      </h1>

      <p>
        Explore figures premium da Esteroids.
      </p>

    </div>

    <div class="shop-search">

      <input
        type="text"
        placeholder="Buscar figure..."
      >

    </div>

  </section>

  <!-- SHOP LAYOUT -->

  <main class="shop-layout">

    <!-- SIDEBAR -->

    <aside class="filters-sidebar">

      <div class="filter-group">

        <h3>
          Categorias
        </h3>

        <label>
          <input type="checkbox">
          Anime
        </label>

        <label>
          <input type="checkbox">
          Games
        </label>

        <label>
          <input type="checkbox">
          Fantasy
        </label>

        <label>
          <input type="checkbox">
          Filmes
        </label>

      </div>

      <div class="filter-group">

        <h3>
          Status
        </h3>

        <label>
          <input type="checkbox">
          Em estoque
        </label>

        <label>
          <input type="checkbox">
          Exclusivos
        </label>

        <label>
          <input type="checkbox">
          Novidades
        </label>

      </div>

    </aside>

    <!-- PRODUCTS -->

    <section class="catalog-grid">

      <!-- CARD -->

      <article class="catalog-card">

        <div class="card-badge">
          Novo
        </div>

        <img
          src="https://placehold.co/400x400"
          alt=""
        >

        <div class="catalog-info">

          <span class="catalog-category">
            Anime
          </span>

          <h3>
            Gojo Satoru Figure
          </h3>

          <p class="catalog-price">
            R$ 499,90
          </p>

          <button class="primary-btn">
            Adicionar ao Carrinho
          </button>

        </div>

      </article>

      <!-- CARD -->

      <article class="catalog-card">

        <div class="card-badge exclusive-badge">
          Exclusivo
        </div>

        <img
          src="https://placehold.co/400x400"
          alt=""
        >

        <div class="catalog-info">

          <span class="catalog-category">
            Games
          </span>

          <h3>
            2B Nier Automata
          </h3>

          <p class="catalog-price">
            R$ 899,90
          </p>

          <button class="primary-btn">
            Adicionar ao Carrinho
          </button>

        </div>

      </article>

      <!-- CARD -->

      <article class="catalog-card">

        <div class="card-badge out-badge">
          Sem Estoque
        </div>

        <img
          src="https://placehold.co/400x400"
          alt=""
        >

        <div class="catalog-info">

          <span class="catalog-category">
            Fantasy
          </span>

          <h3>
            Frieren Figure
          </h3>

          <p class="catalog-price">
            R$ 649,90
          </p>

          <button
            class="primary-btn disabled-btn"
          >
            Indisponível
          </button>

        </div>

      </article>

      <!-- CARD -->

      <article class="catalog-card">

        <img
          src="https://placehold.co/400x400"
          alt=""
        >

        <div class="catalog-info">

          <span class="catalog-category">
            Anime
          </span>

          <h3>
            Levi Ackerman
          </h3>

          <p class="catalog-price">
            R$ 729,90
          </p>

          <button class="primary-btn">
            Adicionar ao Carrinho
          </button>

        </div>

      </article>

    </section>

  </main>

</body>
</html>
